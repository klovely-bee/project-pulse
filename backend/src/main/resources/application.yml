spring:
  application:
    name: project-pulse-backend
  spring:
    datasource:
      url: ${DB_URL:jdbc:mysql://localhost:3306/project_pulse}
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:root}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
